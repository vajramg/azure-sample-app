trigger:
 branches:
   include:
     - main

variables:
   imageName: 
   acr: my1988vg
   repositry:  
     
stages:
  - stage: terraform
    jobs:
      - job: createinfra
        pool:
         vmImage: 'ubuntu-latest'
        steps:
          - script: |
              set -x
              mkdir tfbin
              cd tfbin
              wget https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
              unzip -o terraform_1.7.5_linux_amd64.zip
              ls -ltr
              chmod +x terraform
              sudo mv terraform /usr/local/bin
              terraform version
      
            


      
