trigger:
 branches:
   include:
     - main

variables:
   imageName: myapp
   acr: vg1988myacr
   repositry:  
     
stages:
  - stage: terraform
    jobs:
      - job: createinfra
        pool:
         vmImage: 'ubuntu-latest'
        steps:
          - script: |
              set -x
              mkdir tfbin
              cd tfbin
              wget -O - https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
              sudo apt update && sudo apt install terraform
          - task: AzureCLI@2
            inputs:
               azureSubscription: 'az-resource'
               scriptType: bash
               scriptLocation: inlineScript
               inlineScript: |
                 az account show
                 
                 cd terraform

                 ls -ltr

                 terraform init

                 terraform validate

                 terraform plan -var-file="dev.tfvars"

                 terraform destroy -var-file="dev.tfvars" -auto-approve
  - stage: build
    jobs:
      - job: build
        pool:
         vmImage: 'ubuntu-latest'
         steps:
           - task: AzureCLI@3
             inputs:
               connectionType: 'azureRM'
               azureSubscription: 'az-resource'
               scriptType: 'bash'
               scriptLocation: 'inlineScript'
               inlineScript: |
                azure acr login  --name vg1988myacr
                 docker build -t $(acr).azureacr.io/$(imageName):$(Build:BuildId)
  - stage: push
    jobs:
     - job: push
       pool:
        vmImage: 'ubuntu-latest'
        steps:
        - task: Docker@2
          inputs:
            containerRegistry: 'vg1988myacr'
            command: 'push'