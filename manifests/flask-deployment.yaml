apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-flask
  labels:
    app: my-flask
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-flask
  template:
    metadata:
      labels:
        app: my-flask
    spec:
      containers:
        - name: my-flask
          image: mycontainerregistry2508321094.azurecr.io/flask:v3
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          env:
            - name: DB_HOST

              value: "db-0.db-svc"

            - name: DB_NAME

              value: "launchpage"

            - name: DB_USER_FILE

              value: "/mnt/secret-store/db-user1"

            - name: DB_PASSWORD_FILE

              value: "/mnt/secret-store/db-password"

          volumeMounts:
          - name: my-secret

            mountPath: "/mnt/secret-store"

            readOnly: true
      volumes:
          - name: my-secret
            csi:
              driver: secrets-store.csi.k8s.io
              readOnly: true
              volumeAttributes:
                secretProviderClass: "azure-kv-sync"
